<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Modernization with GitHub Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-code: #1a1a2e;
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00ff;
            --neon-purple: #b366ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3a;
            --success-green: #00ff88;
            --warning-yellow: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-dark); color: var(--text-primary); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; }

        /* Header */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        .header-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); font-weight: 600; font-size: 1.1rem; }
        .header-brand:hover { color: var(--neon-cyan); }
        .header-nav { display: flex; gap: 0.5rem; }
        .header-nav button { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.875rem; transition: all 0.3s ease; }
        .header-nav button:hover:not(:disabled) { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .header-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Layout */
        .layout { display: flex; flex: 1; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border-color); padding: 1.5rem 0; overflow-y: auto; position: sticky; top: 53px; height: calc(100vh - 53px); flex-shrink: 0; }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); padding: 0 1.5rem; margin-bottom: 1rem; }
        .sidebar-list { list-style: none; }
        .sidebar-item { display: block; padding: 0.75rem 1.5rem; text-decoration: none; color: var(--text-secondary); transition: all 0.2s ease; border-left: 3px solid transparent; cursor: pointer; }
        .sidebar-item:hover { color: var(--text-primary); background: rgba(0,245,255,0.05); }
        .sidebar-item.active { color: var(--neon-cyan); border-left-color: var(--neon-cyan); background: rgba(0,245,255,0.08); }
        .sidebar-item-number { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; margin-right: 0.75rem; opacity: 0.6; }
        .sidebar-item-title { font-size: 0.95rem; }

        /* Main content */
        .main { flex: 1; padding: 2rem 3rem; max-width: 900px; min-width: 0; }

        /* Loading spinner */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 0.95rem; }

        /* Markdown content styles */
        .markdown-body { font-size: 1.05rem; line-height: 1.8; }
        .markdown-body h1 { font-size: 2.25rem; font-weight: 700; margin: 2rem 0 1rem; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 600; margin: 2rem 0 1rem; color: var(--neon-cyan); border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.35rem; font-weight: 600; margin: 1.5rem 0 0.75rem; color: var(--neon-purple); }
        .markdown-body h4 { font-size: 1.15rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
        .markdown-body p { margin: 0.75rem 0; color: var(--text-secondary); }
        .markdown-body a { color: var(--neon-cyan); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
        .markdown-body a:hover { border-bottom-color: var(--neon-cyan); }
        .markdown-body strong { color: var(--text-primary); font-weight: 600; }
        .markdown-body em { color: var(--neon-purple); font-style: italic; }
        .markdown-body ul, .markdown-body ol { margin: 0.75rem 0; padding-left: 1.5rem; color: var(--text-secondary); }
        .markdown-body li { margin: 0.35rem 0; }
        .markdown-body li::marker { color: var(--neon-cyan); }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; background: var(--bg-code); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.9em; color: var(--neon-magenta); }
        .markdown-body pre { background: var(--bg-code); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.25rem; margin: 1rem 0; overflow-x: auto; position: relative; }
        .markdown-body pre code { background: none; padding: 0; color: var(--text-primary); font-size: 0.9rem; line-height: 1.6; }
        .markdown-body blockquote { border-left: 4px solid var(--neon-cyan); padding: 0.75rem 1.25rem; margin: 1rem 0; background: rgba(0,245,255,0.05); border-radius: 0 8px 8px 0; }
        .markdown-body blockquote p { color: var(--text-secondary); margin: 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .markdown-body th, .markdown-body td { padding: 0.75rem 1rem; border: 1px solid var(--border-color); text-align: left; }
        .markdown-body th { background: var(--bg-code); color: var(--neon-cyan); font-weight: 600; }
        .markdown-body td { color: var(--text-secondary); }
        .markdown-body tr:hover td { background: rgba(0,245,255,0.03); }
        .markdown-body img { max-width: 100%; border-radius: 8px; margin: 1rem 0; border: 1px solid var(--border-color); }
        .markdown-body hr { border: none; border-top: 1px solid var(--border-color); margin: 2rem 0; }
        .markdown-body input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid var(--border-color); border-radius: 4px; margin-right: 0.5rem; vertical-align: middle; position: relative; cursor: default; }
        .markdown-body input[type="checkbox"]:checked { background: var(--neon-cyan); border-color: var(--neon-cyan); }
        .markdown-body input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--bg-dark); font-size: 12px; font-weight: 700; }

        /* GitHub alerts */
        .alert { padding: 1rem 1.25rem; border-radius: 8px; margin: 1rem 0; border-left: 4px solid; }
        .alert-title { font-weight: 600; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.5rem; }
        .alert-note { background: rgba(0,245,255,0.05); border-color: var(--neon-cyan); }
        .alert-note .alert-title { color: var(--neon-cyan); }
        .alert-tip { background: rgba(0,255,136,0.05); border-color: var(--success-green); }
        .alert-tip .alert-title { color: var(--success-green); }
        .alert-important { background: rgba(179,102,255,0.05); border-color: var(--neon-purple); }
        .alert-important .alert-title { color: var(--neon-purple); }
        .alert-warning { background: rgba(255,204,0,0.05); border-color: var(--warning-yellow); }
        .alert-warning .alert-title { color: var(--warning-yellow); }
        .alert-caution { background: rgba(255,0,255,0.05); border-color: var(--neon-magenta); }
        .alert-caution .alert-title { color: var(--neon-magenta); }

        /* Footer nav */
        .footer-nav { display: flex; justify-content: space-between; padding: 2rem 0; margin-top: 3rem; border-top: 1px solid var(--border-color); }
        .footer-nav a { display: flex; flex-direction: column; text-decoration: none; color: var(--text-secondary); transition: color 0.3s; gap: 0.25rem; }
        .footer-nav a:hover { color: var(--neon-cyan); }
        .footer-nav .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .footer-nav .title { font-size: 1.1rem; color: var(--text-primary); font-weight: 600; }
        .footer-nav a:hover .title { color: var(--neon-cyan); }
        .footer-nav .next { text-align: right; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 1.5rem; }
            .header { padding: 0.5rem 1rem; }
        }
    </style>
    <link rel="stylesheet" href="light-theme.css">
    <script src="theme-toggle.js"></script>
</head>
<body>
    <header class="header">
        <a href="index.html" class="header-brand">☕ App Modernization Workshop</a>
        <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
        <div class="header-nav">
            <button id="prevBtn" onclick="navigateStep(-1)" disabled>← Prev</button>
            <button id="nextBtn" onclick="navigateStep(1)">Next →</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-title">Workshop Steps</div>
            <ul class="sidebar-list" id="sidebarList"></ul>
        </aside>

        <main class="main">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div class="loading-text">Loading content...</div>
            </div>
            <div id="content" class="markdown-body" style="display:none;"></div>
            <nav id="footerNav" class="footer-nav" style="display:none;"></nav>
        </main>
    </div>

    <script>
        const steps = [
            { id: 'readme', file: 'README.md', title: 'Workshop Overview', number: '📚' },
            { id: 'prompts', file: 'PROMPTS.md', title: 'Copilot Prompts Guide', number: '01' },
        ];

        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
        const GITHUB_RAW_BASE = isLocal ? '../' : 'https://raw.githubusercontent.com/copilot-dev-days/appmod-workshop-java/main/';

        let currentStepIndex = 0;

        function getStepFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('step') || 'readme';
        }

        function buildSidebar() {
            const list = document.getElementById('sidebarList');
            list.innerHTML = steps.map((step, i) => `
                <li>
                    <a class="sidebar-item ${i === currentStepIndex ? 'active' : ''}" onclick="goToStep(${i})">
                        <span class="sidebar-item-number">${step.number}</span>
                        <span class="sidebar-item-title">${step.title}</span>
                    </a>
                </li>
            `).join('');
        }

        function updateNav() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            prevBtn.disabled = currentStepIndex === 0;
            nextBtn.disabled = currentStepIndex === steps.length - 1;
        }

        function buildFooterNav() {
            const nav = document.getElementById('footerNav');
            let html = '';
            if (currentStepIndex > 0) {
                const prev = steps[currentStepIndex - 1];
                html += `<a href="?step=${prev.id}" onclick="event.preventDefault(); goToStep(${currentStepIndex - 1})"><span class="label">← Previous</span><span class="title">${prev.title}</span></a>`;
            } else {
                html += '<div></div>';
            }
            if (currentStepIndex < steps.length - 1) {
                const next = steps[currentStepIndex + 1];
                html += `<a class="next" href="?step=${next.id}" onclick="event.preventDefault(); goToStep(${currentStepIndex + 1})"><span class="label">Next →</span><span class="title">${next.title}</span></a>`;
            } else {
                html += '<div></div>';
            }
            nav.innerHTML = html;
            nav.style.display = 'flex';
        }

        function processMarkdown(md) {
            // GitHub alerts
            md = md.replace(/^> \[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\n((?:> .*(?:\n|$))*)/gm, (match, type, body) => {
                const content = body.replace(/^> ?/gm, '').trim();
                const icons = { NOTE: 'ℹ️', TIP: '💡', IMPORTANT: '❗', WARNING: '⚠️', CAUTION: '🔥' };
                return `<div class="alert alert-${type.toLowerCase()}"><div class="alert-title">${icons[type] || ''} ${type}</div><div>${marked.parse(content)}</div></div>\n`;
            });

            // Convert internal .md links to step.html links
            steps.forEach(step => {
                const regex = new RegExp(`\\(${step.file}\\)`, 'g');
                md = md.replace(regex, `(step.html?step=${step.id})`);
            });

            return md;
        }

        async function loadStep(index) {
            const step = steps[index];
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');

            loading.style.display = 'flex';
            content.style.display = 'none';

            try {
                const url = GITHUB_RAW_BASE + step.file;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                let md = await response.text();
                md = processMarkdown(md);
                content.innerHTML = marked.parse(md);
                content.style.display = 'block';

                // Fire confetti on last step
                if (index === steps.length - 1 && typeof confetti === 'function') {
                    setTimeout(() => {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    }, 500);
                }
            } catch (err) {
                content.innerHTML = `<div class="alert alert-warning"><div class="alert-title">⚠️ Error</div><div><p>Could not load content for this step.</p><p>File: <code>${step.file}</code></p><p>${err.message}</p></div></div>`;
                content.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }

            buildFooterNav();
            window.scrollTo(0, 0);
        }

        function goToStep(index) {
            if (index < 0 || index >= steps.length) return;
            currentStepIndex = index;
            const step = steps[index];
            history.pushState(null, '', `?step=${step.id}`);
            buildSidebar();
            updateNav();
            loadStep(index);
        }

        function navigateStep(direction) {
            goToStep(currentStepIndex + direction);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft') navigateStep(-1);
            if (e.key === 'ArrowRight') navigateStep(1);
        });

        // Konami code easter egg
        const konamiCode = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
        let konamiIndex = 0;
        document.addEventListener('keydown', (e) => {
            if (e.keyCode === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    konamiIndex = 0;
                    if (typeof confetti === 'function') {
                        const end = Date.now() + 3000;
                        const interval = setInterval(() => {
                            if (Date.now() > end) return clearInterval(interval);
                            confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 } });
                            confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 } });
                        }, 250);
                    }
                }
            } else {
                konamiIndex = 0;
            }
        });

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const stepId = getStepFromURL();
            const index = steps.findIndex(s => s.id === stepId);
            if (index !== -1) {
                currentStepIndex = index;
                buildSidebar();
                updateNav();
                loadStep(index);
            }
        });

        // Initialize
        (function init() {
            const stepId = getStepFromURL();
            const index = steps.findIndex(s => s.id === stepId);
            currentStepIndex = index !== -1 ? index : 0;
            buildSidebar();
            updateNav();
            loadStep(currentStepIndex);
        })();
    </script>
</body>
</html>
